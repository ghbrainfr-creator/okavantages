<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chargement…</title>
<meta name="description" content="Microsite MonBonAgent — L'agent immobilier qui soutient les commerçants de votre ville.">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root{
  --primary:#f82032;--primary-hover:#d91a2b;
  --dark:#212529;--light:#6c757d;--bg:#fafafa;
  --radius:12px;--card-shadow:0 2px 15px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--dark);line-height:1.5}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}
.container{max-width:1200px;margin:0 auto;padding:0 20px}

/* Nav */
nav{background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06);position:sticky;top:0;z-index:100;padding:12px 0}
nav .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.brand{font-size:20px;font-weight:700;color:var(--primary)}
.brand span{color:#000}
.nav-links{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.nav-links a{font-weight:500;font-size:14px}
.nav-links a:hover{color:var(--primary)}
.nav-cta{background:var(--primary);color:#fff!important;padding:8px 18px;border-radius:8px}
.nav-cta:hover{background:var(--primary-hover)}

/* Hero */
.hero{background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)) center/cover;color:#fff;padding:90px 0 110px;text-align:center;position:relative}
.hero h1{font-size:clamp(30px,5vw,46px);font-weight:700;margin-bottom:14px}
.hero .sub{font-size:17px;opacity:.92;max-width:720px;margin:0 auto 28px}
.hero .badge{display:inline-block;background:rgba(255,255,255,.15);padding:6px 16px;border-radius:50px;font-size:13px;margin-bottom:16px;backdrop-filter:blur(6px)}
.agent-card{max-width:640px;margin:-60px auto 0;background:#fff;border-radius:var(--radius);box-shadow:var(--card-shadow);padding:24px;display:flex;gap:20px;align-items:center;position:relative;z-index:5}
.agent-card .photo{width:100px;height:100px;border-radius:50%;background:#eee center/cover;border:4px solid #fff;box-shadow:0 4px 14px rgba(0,0,0,.12);flex-shrink:0}
.agent-card h3{font-size:20px;margin-bottom:4px}
.agent-card .role{color:var(--light);font-size:14px;margin-bottom:10px}
.agent-card .cta-row{display:flex;gap:10px;flex-wrap:wrap}
.agent-card .cta-row a{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid #e0e0e0}
.agent-card .cta-row a.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.agent-card .cta-row a:hover{transform:translateY(-1px)}

/* Sections */
section{padding:60px 0}
section.alt{background:#fff}
.section-title{text-align:center;margin-bottom:36px}
.section-title h2{font-size:28px;font-weight:700;margin-bottom:8px}
.section-title p{color:var(--light)}

/* Grid cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--card-shadow);overflow:hidden;transition:transform .2s}
.card:hover{transform:translateY(-3px)}
.card .body{padding:18px}
.card h4{font-size:16px;margin-bottom:6px}
.card .meta{color:var(--light);font-size:13px}
.card .tag{display:inline-block;background:#f0f0f0;color:var(--dark);padding:3px 10px;border-radius:50px;font-size:11px;margin-top:8px}
.empty{text-align:center;color:var(--light);padding:40px 20px;background:#fff;border-radius:var(--radius);border:1px dashed #e0e0e0}

/* About */
.about-box{background:#fff;padding:32px;border-radius:var(--radius);box-shadow:var(--card-shadow);max-width:820px;margin:0 auto}
.about-box p{margin-bottom:14px;color:#444}
.specialties{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.specialties span{background:var(--primary);color:#fff;padding:5px 13px;border-radius:50px;font-size:12px;font-weight:500}

/* Contest banner */
.contest-banner{background:linear-gradient(135deg,var(--primary),var(--primary-hover));color:#fff;padding:40px 30px;border-radius:var(--radius);text-align:center;margin:20px 0}
.contest-banner h3{font-size:24px;margin-bottom:8px}
.contest-banner a{display:inline-block;background:#fff;color:var(--primary);padding:11px 26px;border-radius:8px;font-weight:600;margin-top:14px}

/* Footer */
footer{background:#1a1a1a;color:#ccc;padding:50px 0 20px;margin-top:40px}
footer h5{color:#fff;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.footer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:30px;margin-bottom:30px}
.footer-grid ul{list-style:none}
.footer-grid li{margin-bottom:8px}
.footer-grid a{color:#aaa;font-size:13px;transition:.2s}
.footer-grid a:hover{color:#fff}
.footer-bottom{border-top:1px solid #333;padding-top:20px;text-align:center;font-size:12px;color:#888}
.footer-bottom a{color:#bbb;margin:0 10px}

/* Single page view */
.page-view{background:#fff;padding:40px 30px;border-radius:var(--radius);box-shadow:var(--card-shadow);margin-bottom:40px;max-width:820px;margin-left:auto;margin-right:auto}
.page-view h1{font-size:28px;margin-bottom:20px;color:var(--dark)}
.page-view h2{font-size:19px;margin:22px 0 10px;color:var(--dark)}
.page-view p{margin-bottom:12px;color:#444;line-height:1.7}
.page-view ul{margin:0 0 14px 22px;color:#444}
.page-view a{color:var(--primary);text-decoration:underline}
.back-btn{display:inline-block;margin-bottom:20px;color:var(--primary);font-weight:500}
.back-btn:hover{text-decoration:underline}

/* Loading */
.loading{text-align:center;padding:80px 20px;color:var(--light)}
.loading i{font-size:34px;animation:spin 1s linear infinite;margin-bottom:14px;display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* 404 */
.error-box{text-align:center;padding:80px 20px}
.error-box h1{font-size:42px;margin-bottom:10px}

@media (max-width:640px){
  .agent-card{flex-direction:column;text-align:center}
  .agent-card .cta-row{justify-content:center}
  .hero{padding:60px 0 90px}
}
</style>
</head>
<body>

<div id="app">
  <div class="loading"><i class="fas fa-spinner"></i>Chargement du microsite…</div>
</div>

<script>
(function(){
  const qs = new URLSearchParams(location.search);
  const slug = qs.get('slug');
  const pageSlug = qs.get('page');

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function applyBrand(brand){
    if(!brand) return;
    const r = document.documentElement.style;
    if(brand.primary) r.setProperty('--primary', brand.primary);
    if(brand.primary_hover || brand.primaryHover) r.setProperty('--primary-hover', brand.primary_hover || brand.primaryHover);
    if(brand.dark) r.setProperty('--dark', brand.dark);
    if(brand.bg) r.setProperty('--bg', brand.bg);
  }

  function renderError(msg){
    document.getElementById('app').innerHTML =
      '<div class="error-box"><h1>404</h1><p>'+esc(msg)+'</p><p style="margin-top:20px"><a href="https://monbonagent.vercel.app" style="color:var(--primary)">Retour à l\u2019accueil MonBonAgent</a></p></div>';
  }

  function renderHeader(agent){
    const fullName = agent.name + (agent.title ? ' — ' + agent.title : '');
    return (
      '<nav><div class="container">'+
        '<a class="brand" href="/agent/'+esc(agent.slug)+'">Mon<span>Bon</span>Agent · '+esc(agent.name.split(' ')[0])+'</a>'+
        '<div class="nav-links">'+
          '<a href="#commercants">Commerçants</a>'+
          '<a href="#blog">Blog</a>'+
          '<a href="#about">À propos</a>'+
          (agent.phone ? '<a class="nav-cta" href="tel:'+esc(agent.phone)+'"><i class="fas fa-phone"></i> '+esc(agent.phone)+'</a>' : '')+
        '</div>'+
      '</div></nav>'
    );
  }

  function renderFooter(agent, footer){
    let sectionsHtml = '';
    (footer.sections || []).forEach(s => {
      sectionsHtml += '<div><h5>'+esc(s.title)+'</h5><ul>';
      (s.links || []).forEach(l => {
        const href = l.url.startsWith('/') ? '/agent/'+encodeURIComponent(agent.slug)+l.url.replace('/footer-page.html?slug=','/') : l.url;
        // Rewrite footer-page links to agent-scoped pages
        let finalHref = l.url;
        const m = /footer-page\.html\?slug=([^&]+)/.exec(l.url);
        if(m) finalHref = '/agent/'+encodeURIComponent(agent.slug)+'/'+m[1];
        sectionsHtml += '<li><a href="'+esc(finalHref)+'">'+esc(l.label)+'</a></li>';
      });
      sectionsHtml += '</ul></div>';
    });
    return (
      '<footer><div class="container">'+
        '<div class="footer-grid">'+sectionsHtml+'</div>'+
        '<div class="footer-bottom">© '+new Date().getFullYear()+' MonBonAgent · '+esc(agent.name)+
          (agent.agency ? ' — '+esc(agent.agency) : '')+'</div>'+
      '</div></footer>'
    );
  }

  async function loadSite(){
    try{
      const r = await fetch('/api/agent-site?slug='+encodeURIComponent(slug));
      const data = await r.json();
      if(!data.ok){ renderError(data.error === 'agent_not_found' ? 'Ce microsite n\u2019existe pas.' : (data.error || 'Erreur')); return; }
      applyBrand(data.agent.brand);
      document.title = data.agent.name + (data.agent.title ? ' — '+data.agent.title : '') + ' · MonBonAgent';

      const a = data.agent;
      const coverBg = a.cover_url ? 'background-image:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),url(\''+esc(a.cover_url)+'\')' : 'background:linear-gradient(135deg,var(--primary),var(--primary-hover))';
      const photo = a.photo_url ? 'background-image:url(\''+esc(a.photo_url)+'\');background-size:cover;background-position:center' : 'background:#eee;display:flex;align-items:center;justify-content:center;color:#888;font-size:36px';
      const photoInner = a.photo_url ? '' : '<i class="fas fa-user"></i>';

      let merchantsHtml = '';
      if((data.merchants||[]).length){
        merchantsHtml = '<div class="grid">';
        data.merchants.forEach(m => {
          merchantsHtml += '<a class="card" href="/merchant?slug='+esc(m.slug)+'"><div class="body"><h4>'+esc(m.name)+'</h4><div class="meta"><i class="fas fa-store"></i> Commerce local</div></div></a>';
        });
        merchantsHtml += '</div>';
      } else {
        merchantsHtml = '<div class="empty">Les premiers commerçants partenaires arrivent bientôt. Vous êtes commerçant ? <a href="/agent/'+esc(a.slug)+'/vous-etes-commercant" style="color:var(--primary)">Rejoignez-nous</a>.</div>';
      }

      let blogHtml = '';
      if((data.blog||[]).length){
        blogHtml = '<div class="grid">';
        data.blog.forEach(p => {
          const d = p.published_at ? new Date(p.published_at).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}) : '';
          blogHtml += '<div class="card"><div class="body"><h4>'+esc(p.title)+'</h4><div class="meta">'+esc(d)+'</div></div></div>';
        });
        blogHtml += '</div>';
      } else {
        blogHtml = '<div class="empty">Premier article en préparation.</div>';
      }

      let contestHtml = '';
      if(data.contest){
        contestHtml = '<div class="contest-banner"><h3><i class="fas fa-gift"></i> Jeu-concours en cours : '+esc(data.contest.title)+'</h3><p>Participez gratuitement, sans obligation d\u2019achat.</p><a href="/contest.html?slug='+esc(data.contest.slug)+'">Tenter ma chance</a></div>';
      }

      let specialtiesHtml = '';
      if((a.specialties||[]).length){
        specialtiesHtml = '<div class="specialties">'+a.specialties.map(s => '<span>'+esc(s)+'</span>').join('')+'</div>';
      }

      const html =
        renderHeader(a)+
        '<section class="hero" style="'+coverBg+'">'+
          '<div class="container">'+
            (a.city && a.city.name ? '<div class="badge"><i class="fas fa-map-marker-alt"></i> '+esc(a.city.name)+'</div>' : '')+
            '<h1>'+esc(a.name)+(a.title ? ' — '+esc(a.title) : '')+'</h1>'+
            '<p class="sub">'+esc(a.signature || 'L\u2019immobilier et le commerce local, la main dans la main.')+'</p>'+
          '</div>'+
        '</section>'+
        '<div class="container"><div class="agent-card">'+
          '<div class="photo" style="'+photo+'">'+photoInner+'</div>'+
          '<div style="flex:1">'+
            '<h3>'+esc(a.name)+'</h3>'+
            '<div class="role">'+esc(a.title || 'Conseiller immobilier')+(a.agency?' · '+esc(a.agency):'')+'</div>'+
            '<div class="cta-row">'+
              (a.phone?'<a class="primary" href="tel:'+esc(a.phone)+'"><i class="fas fa-phone"></i> Appeler</a>':'')+
              (a.whatsapp?'<a href="https://wa.me/'+esc(a.whatsapp.replace(/[^0-9]/g,''))+'"><i class="fab fa-whatsapp"></i> WhatsApp</a>':'')+
              (a.email?'<a href="mailto:'+esc(a.email)+'"><i class="fas fa-envelope"></i> Email</a>':'')+
              (a.linkedin_url?'<a href="'+esc(a.linkedin_url)+'" target="_blank"><i class="fab fa-linkedin"></i></a>':'')+
            '</div>'+
          '</div>'+
        '</div></div>'+
        (contestHtml ? '<div class="container">'+contestHtml+'</div>' : '')+
        '<section id="commercants"><div class="container"><div class="section-title"><h2>Commerçants du quartier</h2><p>Découvrez les pépites locales que je soutiens.</p></div>'+merchantsHtml+'</div></section>'+
        '<section id="blog" class="alt"><div class="container"><div class="section-title"><h2>Blog & magazine local</h2><p>Mes derniers articles sur le quartier, l\u2019immobilier et les bonnes adresses.</p></div>'+blogHtml+'</div></section>'+
        '<section id="about"><div class="container"><div class="section-title"><h2>À propos de '+esc(a.name.split(' ')[0])+'</h2></div><div class="about-box">'+
          '<p>'+esc(a.bio || 'Conseiller immobilier de proximité, je mets ma connaissance du quartier au service des habitants et des commerçants.')+'</p>'+
          specialtiesHtml+
        '</div></div></section>'+
        renderFooter(a, data.footer);

      document.getElementById('app').innerHTML = html;
    }catch(e){
      renderError('Erreur de chargement : '+e.message);
    }
  }

  async function loadPage(){
    try{
      const r = await fetch('/api/agent-site?slug='+encodeURIComponent(slug)+'&page='+encodeURIComponent(pageSlug));
      const data = await r.json();
      if(!data.ok){ renderError(data.error === 'page_not_found' ? 'Cette page n\u2019existe pas.' : (data.error || 'Erreur')); return; }
      applyBrand(data.agent.brand);
      document.title = data.page.title + ' · MonBonAgent';
      const html =
        '<nav><div class="container">'+
          '<a class="brand" href="/agent/'+esc(data.agent.slug)+'">Mon<span>Bon</span>Agent · '+esc(data.agent.name.split(' ')[0])+'</a>'+
          '<div class="nav-links"><a class="nav-cta" href="/agent/'+esc(data.agent.slug)+'"><i class="fas fa-arrow-left"></i> Retour au site</a></div>'+
        '</div></nav>'+
        '<div class="container" style="padding-top:30px">'+
          '<a class="back-btn" href="/agent/'+esc(data.agent.slug)+'"><i class="fas fa-arrow-left"></i> Retour</a>'+
          '<div class="page-view">'+data.page.body_html+'</div>'+
        '</div>';
      document.getElementById('app').innerHTML = html;
    }catch(e){
      renderError('Erreur de chargement : '+e.message);
    }
  }

  if(!slug){ renderError('Microsite introuvable : slug manquant.'); return; }
  if(pageSlug) loadPage(); else loadSite();
})();
</script>
</body>
</html>
