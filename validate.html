<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Valider un bon — MonBonAgent</title>
<meta name="description" content="Interface commerçant : valider un bon d'achat MonBonAgent en saisissant ou scannant son code.">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#e11d48;--primary-hover:#be123c;--dark:#111;--bg:#fafafa}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:#333;line-height:1.6}
header{background:var(--dark);color:#fff;padding:16px 24px;text-align:center}
header a{text-decoration:none;color:#fff;font-size:20px;font-weight:700}
header a span{color:var(--primary)}
.tag{display:block;font-size:12px;opacity:.7;margin-top:4px}
main{max-width:560px;margin:32px auto;padding:0 20px}
.card{background:#fff;border-radius:14px;padding:28px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
h1{margin:0 0 6px;font-size:22px;color:var(--dark)}
.sub{color:#666;font-size:14px;margin-bottom:20px}
.form{display:flex;gap:8px;margin-bottom:16px}
.form input{flex:1;padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:18px;letter-spacing:2px;font-family:monospace;text-transform:uppercase}
.form input:focus{outline:none;border-color:var(--primary)}
.btn{padding:12px 22px;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-size:15px;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-ghost{background:#fff;color:var(--dark);border:1px solid #ddd}
.result{margin-top:20px;padding:20px;border-radius:10px;border-left:4px solid}
.result.ok{background:#ecfdf5;border-color:#10b981}
.result.warn{background:#fffbeb;border-color:#f59e0b}
.result.err{background:#fef2f2;border-color:#ef4444}
.result.used{background:#f3f4f6;border-color:#6b7280}
.result h2{margin:0 0 8px;font-size:18px;color:var(--dark)}
.result dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:14px}
.result dt{color:#666;font-weight:600}
.result dd{margin:0}
.confirm{margin-top:14px;display:flex;gap:8px}
.confirm .btn-primary{background:#10b981}
.confirm .btn-primary:hover{background:#059669}
footer{text-align:center;padding:28px;color:#999;font-size:13px}
footer a{color:#999;text-decoration:none}
</style>
</head>
<body>
<header>
  <a href="/">MonBon<span>Agent</span></a>
  <span class="tag">Espace commerçant · Validation d'un bon</span>
</header>
<main>
  <div class="card">
    <h1>Valider un bon</h1>
    <p class="sub">Saisissez ou scannez le code du bon présenté par votre client.</p>
    <form class="form" onsubmit="return checkCode(event)">
      <input id="code" type="text" placeholder="Code du bon" autocomplete="off" required>
      <button class="btn btn-primary" type="submit">Vérifier</button>
    </form>
    <div id="out"></div>
  </div>
</main>
<footer>&copy; MonBonAgent — <a href="/">Retour à l'accueil</a></footer>
<script>
var SUPABASE_URL='https://rvknysmuuusygowwauar.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2a255c211dXVzeWdvd3dhdWFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTc0OTYsImV4cCI6MjA5MTMzMzQ5Nn0._X2KohbYZIqn_1d4bf0tlbimlNAKHflmUCW-vbj1yTg';
var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]);});}
function fmt(iso){if(!iso)return'—';return new Date(iso).toLocaleString('fr-FR');}
async function checkCode(e){
  if(e)e.preventDefault();
  var code=(document.getElementById('code').value||'').trim().toUpperCase();
  var out=document.getElementById('out');
  if(!code){out.innerHTML='';return false;}
  out.innerHTML='<div class="result warn">Recherche…</div>';
  var r=await sb.from('voucher_purchases').select('*').eq('code',code).maybeSingle();
  if(r.error||!r.data){out.innerHTML='<div class="result err"><h2>Bon introuvable</h2>Aucun bon ne correspond au code saisi.</div>';return false;}
  var v=r.data;
  var mr=v.merchant_id?await sb.from('merchants').select('name').eq('id',v.merchant_id).maybeSingle():{data:null};
  var or=v.offer_id?await sb.from('offers').select('description').eq('id',v.offer_id).maybeSingle():{data:null};
  var m=mr.data||{},o=or.data||{};
  var statusClass=v.status==='used'?'used':(v.status==='paid'||v.status==='pending'?'ok':'err');
  var canUse=v.status==='paid'||v.status==='pending';
  out.innerHTML=''+
    '<div class="result '+statusClass+'">'+
      '<h2>'+esc(o.description||'Bon')+' — '+esc(v.status.toUpperCase())+'</h2>'+
      '<dl>'+
        '<dt>Commerce</dt><dd>'+esc(m.name||'—')+'</dd>'+
        '<dt>Acheteur</dt><dd>'+esc(v.buyer_name||v.buyer_email||'—')+'</dd>'+
        '<dt>E-mail</dt><dd>'+esc(v.buyer_email)+'</dd>'+
        '<dt>Montant</dt><dd>'+(v.amount?Number(v.amount).toFixed(2)+' €':'—')+(v.gift?' + '+Number(v.gift).toFixed(2)+' € offerts':'')+'</dd>'+
        '<dt>Acheté le</dt><dd>'+esc(fmt(v.created_at))+'</dd>'+
        (v.expires_at?'<dt>Valable jusqu\'au</dt><dd>'+esc(fmt(v.expires_at))+'</dd>':'')+
        (v.used_at?'<dt>Utilisé le</dt><dd>'+esc(fmt(v.used_at))+'</dd>':'')+
      '</dl>'+
      (canUse?'<div class="confirm"><button class="btn btn-primary" onclick="markUsed(\''+esc(v.id)+'\')">Valider &amp; marquer utilisé</button><button class="btn btn-ghost" onclick="document.getElementById(\'code\').value=\'\';document.getElementById(\'out\').innerHTML=\'\';">Annuler</button></div>':'')+
    '</div>';
  return false;
}
async function markUsed(id){
  var r=await sb.from('voucher_purchases').update({status:'used',used_at:new Date().toISOString()}).eq('id',id).select('id,code,status').maybeSingle();
  if(r.error){document.getElementById('out').innerHTML='<div class="result err"><h2>Erreur</h2>'+esc(r.error.message)+'</div>';return;}
  document.getElementById('out').innerHTML='<div class="result ok"><h2>Bon validé ✔</h2>Le bon <strong>'+esc(r.data.code)+'</strong> a été marqué comme utilisé.<div class="confirm"><button class="btn btn-ghost" onclick="document.getElementById(\'code\').value=\'\';document.getElementById(\'out\').innerHTML=\'\';document.getElementById(\'code\').focus();">Valider un autre bon</button></div></div>';
}
(async function(){
  var ss=await sb.from('site_settings').select('color_primary,color_dark,color_bg').limit(1).maybeSingle();
  if(ss.data){var s=document.documentElement.style;if(ss.data.color_primary)s.setProperty('--primary',ss.data.color_primary);if(ss.data.color_dark)s.setProperty('--dark',ss.data.color_dark);if(ss.data.color_bg)s.setProperty('--bg',ss.data.color_bg);}
  var p=new URLSearchParams(location.search);var c=p.get('code');
  if(c){document.getElementById('code').value=c;checkCode();}
  document.getElementById('code').focus();
})();
</script>
</body>
</html>
