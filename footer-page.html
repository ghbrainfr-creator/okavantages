<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">

    <meta name="description" id="page-meta" content="">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      :root{--primary:#0060e0;--dark:#212529;--bg:#f5f6f8}
      body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:#333;line-height:1.7}
      header{background:#fff;border-bottom:1px solid #e9ecef;padding:16px 24px;text-align:center}
      header a{text-decoration:none;font-size:20px;font-weight:700;color:var(--primary)}
      header a span{color:var(--dark)}
      main{max-width:800px;margin:40px auto;padding:0 24px}
      h1{font-size:28px;margin-bottom:24px;color:var(--dark)}
      .content{background:#fff;padding:32px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
      .content h2{font-size:20px;margin:24px 0 12px;color:var(--dark)}
      .content p{margin-bottom:16px}
      .content ul,.content ol{margin:0 0 16px 24px}
      .content a{color:var(--primary)}
      .error-box{text-align:center;padding:80px 24px}
      .error-box h1{font-size:64px;color:#ccc;margin-bottom:8px}
      .error-box p{font-size:18px;color:#666;margin-bottom:24px}
      .error-box a{color:var(--primary);text-decoration:none;font-weight:500}
      footer{text-align:center;padding:32px;color:#999;font-size:13px;margin-top:40px}
      footer a{color:#999;text-decoration:none}
      </style>
  </head>
  <body>
    <header><a href="/">Mon<span>Bon</span>Agent</a>a></header>
  <main id="main-content">
  <div class="error-box" id="loading"><p>Chargement...</p></div>div>
  </main>main>
  <footer><a href="/">Retour a l'accueil MonBonAgent</a>a></footer>
  <script>
    var SUPABASE_URL='https://rvknysmuuusygowwauar.supabase.co';
    var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2a255c211dXVzeWdvd3dhdWFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTc0OTYsImV4cCI6MjA5MTMzMzQ5Nn0._X2KohbYZIqn_1d4bf0tlbimlNAKHflmUCW-vbj1yTg';
    var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    (async function(){
      var params=new URLSearchParams(window.location.search);
      var slug=params.get('slug');
      var el=document.getElementById('main-content');
      if(!slug){el.innerHTML='<div class="error-box"><h1>404</h1><p>Page introuvable : slug manquant.</p><a href="/">Retour</a></div>';return;}
      var res=await sb.from('footer_pages').select('*').eq('slug',slug).single();
      if(res.error||!res.data){el.innerHTML='<div class="error-box"><h1>404</h1><p>Page introuvable.</p><a href="/">Retour</a></div>';return;}
      var page=res.data;
      document.getElementById('page-title').textContent=page.title+' — MonBonAgent';
      if(page.meta_description){document.getElementById('page-meta').setAttribute('content',page.meta_description);}
      var html='<h1>'+page.title+'</h1><div class="content">';
      if(page.body_html){
        var body=page.body_html;
        if(body.indexOf('<')===-1){body=body.split('\n\n').map(function(p){return '<p>'+p.replace(/\n/g,'<br>')+'</p>';}).join('');}
        html+=body;
      }else{html+='<p>Contenu a venir.</p>';}
      html+='</div>';
      el.innerHTML=html;
      var ss=await sb.from('site_settings').select('color_primary').limit(1).single();
      if(ss.data&&ss.data.color_primary){document.documentElement.style.setProperty('--primary',ss.data.color_primary);}
    })();
  </script>
  </body>
