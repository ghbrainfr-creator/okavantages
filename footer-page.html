<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title id="page-title">Page — MonBonAgent</title>
    <meta name="description" id="page-meta" content="">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      :root{--primary:#e11d48;--dark:#111;--bg:#fafafa}
      *{box-sizing:border-box}
      body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:var(--bg);color:#333;line-height:1.7}
      header{background:#fff;border-bottom:1px solid #e9ecef;padding:16px 24px;text-align:center}
      header a{text-decoration:none;font-size:20px;font-weight:700;color:var(--primary)}
      header a span{color:var(--dark)}
      main{max-width:820px;margin:32px auto;padding:0 20px}
      .content{background:#fff;border-radius:12px;padding:32px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
      .content h1{font-size:28px;margin:0 0 16px;color:var(--dark)}
      .content h2{font-size:20px;margin:24px 0 12px;color:var(--dark)}
      .content p{margin-bottom:16px}
      .content ul,.content ol{margin:0 0 16px 24px}
      .content a{color:var(--primary)}
      .error-box{text-align:center;padding:40px 20px;color:#666}
      .back{display:inline-block;margin-top:24px;color:var(--primary);text-decoration:none;font-weight:500}
      footer{text-align:center;padding:32px;color:#999;font-size:13px;margin-top:40px}
      footer a{color:#999;text-decoration:none}
    </style>
  </head>
  <body>
    <header><a href="/">Mon<span>Bon</span>Agent</a></header>
    <main id="main-content">
      <div class="content" id="page-content">Chargement…</div>
    </main>
    <footer>© MonBonAgent — <a href="/">Retour à l’accueil</a></footer>
    <script>
      var SUPABASE_URL="https://rvknysmuuusygowwauar.supabase.co";
      var SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2a255c211dXVzeWdvd3dhdWFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTc0OTYsImV4cCI6MjA5MTMzMzQ5Nn0._X2KohbYZIqn_1d4bf0tlbimlNAKHflmUCW-vbj1yTg";
      var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
      (async function(){
        var params=new URLSearchParams(location.search);
        var slug=params.get("slug");
        var el=document.getElementById("page-content");
        var backLink='<a class="back" href="/">← Retour à l’accueil</a>';
        if(!slug){el.innerHTML='<div class="error-box"><h1>404</h1><p>Page introuvable : slug manquant.</p>'+backLink+'</div>';return;}
        var res=await sb.from("footer_pages").select("*").eq("slug",slug).eq("is_published",true).maybeSingle();
        if(res.error||!res.data){el.innerHTML='<div class="error-box"><h1>404</h1><p>Page introuvable.</p>'+backLink+'</div>';return;}
        var page=res.data;
        document.getElementById("page-title").textContent=page.title+" — MonBonAgent";
        if(page.meta_description){document.getElementById("page-meta").setAttribute("content",page.meta_description);}
        var body=page.body_html||"";
        if(body.indexOf("<")===-1){body=body.split("\n\n").map(function(p){return "<p>"+p.replace(/\n/g,"<br>")+"</p>";}).join("");}
        el.innerHTML="<h1>"+page.title+"</h1>"+body+backLink;
        var ss=await sb.from("agent_settings").select("color_primary").maybeSingle();
        if(ss.data&&ss.data.color_primary){document.documentElement.style.setProperty("--primary",ss.data.color_primary);}
      })();
    </script>
  </body>
</html>
